# Промо-код (не должен содержать пробелы!)
test:
  
  # Лимит на его использования
  limit: 1
  
  # До какого срока промо-код актуален?
  # (Введите время только в формате PHP!)
  # https://www.php.net/manual/ru/datetime.formats.php
  date: "2023-12-12 23:59"
  
  # Команды которые будут выполнены от имени консоли при активации промо-кода
  # (ИСПОЛЬЗУЙТЕ ДЛЯ ВЫДАЧИ НАГРАДЫ)
  # @player - Ник игрока
  # @ip - IP адрес игрока
  commands:
    - "gamemode 1 @player"
    - "kick @player Шутка :)"

test2:
  limit: 1
  date: "2022-12-12 23:59"
  commands:
    - "setgroup @player Admin"