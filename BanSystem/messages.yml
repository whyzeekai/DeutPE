# OneWellBans
# Конфиг для настройки сообщений (удобно и легко)
# _________________________________________________________
# Обозначение переменных для обычного бана:
# {dateban} - дата и время когда забанили нарушителя
# {nickname} - никнейм нарушителя
# {time} - время до разблокировки
# {banned} - никнейм админа (того кто забанил)
# {reason} - причина блокировки
# _________________________________________________________

owb-ban: "§l§7► §l§cАККАУНТ ЗАБЛОКИРОВАН!§r§7 {dateban}\n§l§7► §r§rВы: §a{nickname} §rбыли заблокированы игроком: §r§c{banned}\n§l§7► §r§rПо причине: §a{reason}§r, на: §a{time}\n§l§7► §r§rЖдем его док-ва в течение 2-ух часов: §avk.com/onewix_bans"

owb-banip: "§l§7► §l§cАККАУНТ ЗАБЛОКИРОВАН ПО IP!§r§7 {dateban}\n§l§7► §r§rВы: §a{nickname} §rбыли заблокированы игроком: §r§c{banned}\n§l§7► §r§rПо причине: §a{reason}§r, на: §a{time}\n§l§7► §r§rЖдем его док-ва в течение 2-ух часов: §avk.com/onewix_bans"

owb-mute: "§l§7► §r§rВаш чат заблокирован, игроком: §c{muted}§r, по причине: §a{reasonmute}§r, на: §a{mutetime}"